name: facebook_audience_network
description:
  Facebook Audience Network plugin for Flutter apps. You can show Facebook Banner
  ads, Interstitial ads, Rewarded video ads and Native ads though this plugin.

version: 1.0.4

homepage: https://github.com/dreamsoftin/facebook_audience_network

environment:
  sdk: ^3.0.0
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  meta: ^1.7.0
  characters: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.dsi.facebook_audience_network
        pluginClass: FacebookAudienceNetworkPlugin
      ios:
        pluginClass: FacebookAudienceNetworkPlugin
